
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — 24x7 Vahan Sahayata</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0A0E1A;color:#F0F4FF;font-family:'Segoe UI',sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;
       text-align:center;padding:24px}
  .icon{font-size:80px;margin-bottom:24px;animation:pulse 2s infinite}
  h1{font-size:28px;font-weight:800;color:#E53935;margin-bottom:12px}
  p{color:#9CA3AF;font-size:16px;line-height:1.6;max-width:340px;margin:0 auto 32px}
  .btn{display:inline-block;background:#E53935;color:#fff;
       padding:14px 32px;border-radius:50px;font-size:16px;font-weight:700;
       text-decoration:none;cursor:pointer;border:none;
       transition:transform 0.2s,box-shadow 0.2s}
  .btn:hover{transform:scale(1.05);box-shadow:0 8px 24px #E5393560}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
</style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>Internet Nahi Hai!</h1>
    <p>Lagta hai aap offline hain. Apna internet connection check karein aur phir try karein.</p>
    <button class="btn" onclick="window.location.reload()">🔄 Dobara Try Karein</button>
  </div>
</body>
</html>
