<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - 24x7 Vahan Sahayata</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FFF5F5 0%, #F0F9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #DC2626;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status {
            background: #FEE2E2;
            color: #991B1B;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status.online {
            background: #DCFCE7;
            color: #166534;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(220, 38, 38, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #DC2626;
            border: 2px solid #DC2626;
        }

        .btn-secondary:hover {
            background: #FEE2E2;
        }

        .tips {
            background: #F3F4F6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 13px;
            color: #666;
        }

        .tips h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .tips ul {
            list-style-position: inside;
            line-height: 1.8;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E5E7EB;
            border-top: 4px solid #DC2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🚗</div>
        <h1>आप Offline हैं 📵</h1>
        <p>Internet connection की समस्या है। कुछ features काम नहीं कर सकते।</p>

        <div class="status" id="statusBox">
            🔴 Offline - Internet से जुड़ें
        </div>

        <div class="spinner" id="statusSpinner"></div>

        <div class="actions">
            <button class="btn-primary" onclick="location.reload()">
                🔄 फिर से कोशिश करें
            </button>
            <button class="btn-secondary" onclick="goHome()">
                🏠 Home पर जाएं
            </button>
        </div>

        <div class="tips">
            <h3>✅ करने के लिए:</h3>
            <ul>
                <li>WiFi या Mobile Data चालू करें</li>
                <li>Flight Mode बंद करें</li>
                <li>Router restart करें</li>
                <li>Internet की स्पीड check करें</li>
            </ul>
        </div>
    </div>

    <script>
        // Check if online
        function checkConnection() {
            if (navigator.onLine) {
                document.getElementById('statusBox').textContent = '🟢 Online - अब काम करेगा!';
                document.getElementById('statusBox').className = 'status online';
                document.getElementById('statusSpinner').style.display = 'none';
                
                setTimeout(() => {
                    location.reload();
                }, 1500);
            } else {
                document.getElementById('statusBox').textContent = '🔴 Offline - Internet से जुड़ें';
                document.getElementById('statusBox').className = 'status';
            }
        }

        // Go home
        function goHome() {
            window.location.href = '/index.html';
        }

        // Check connection on page load
        window.addEventListener('load', checkConnection);

        // Check connection every 2 seconds
        setInterval(checkConnection, 2000);

        // Listen for online event
        window.addEventListener('online', () => {
            checkConnection();
        });

        // Listen for offline event
        window.addEventListener('offline', () => {
            document.getElementById('statusBox').textContent = '🔴 Offline - Internet से जुड़ें';
            document.getElementById('statusBox').className = 'status';
        });
    </script>
</body>
</html>
